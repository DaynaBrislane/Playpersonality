<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Journeys</title>
  <link rel="stylesheet" href="journeys.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="journeys-page">

    <!-- Header -->
    <div class="journeys-header">
      <svg class="journeys-header-icon" width="44" height="44" viewBox="0 0 44 44" fill="none">
        <path d="M0 22C0 9.849 9.849 0 22 0s22 9.849 22 22H0z" fill="#80DADA"/>
        <path d="M0 44C0 31.849 9.849 22 22 22s22 9.849 22 22H0z" fill="#80DADA"/>
      </svg>
      <div class="journeys-header-text">
        <h1 class="journeys-title">Journeys</h1>
        <p class="journeys-subtitle">Journeys is in Beta. <a href="#" class="journeys-learn-more">Learn More.</a></p>
      </div>
      <button class="add-goal-btn" id="add-goal-btn">Add Goal</button>
    </div>

    <!-- Tabs -->
    <div class="goals-tabs">
      <button class="goals-tab active" data-tab="your">Your Goals</button>
      <button class="goals-tab" data-tab="team">Team Goals</button>
    </div>

    <!-- Your Goals Tab -->
    <div id="your-goals-tab">
      <!-- Priority Goals -->
      <div class="priority-goals-card">
        <p class="priority-goals-label">Priority Goals</p>
        <div class="priority-goals-body">
          <div class="goal-list" id="priority-goal-list"></div>
          <div class="goal-detail" id="priority-goal-detail"></div>
        </div>
      </div>

      <!-- Other Goals -->
      <p class="other-goals-label">Other Goals</p>
      <div class="goals-grid" id="other-goals-grid"></div>
    </div>

    <!-- Team Goals -->
    <div class="team-goals" id="team-goals-tab" style="display:none"></div>

  </div>

  <!-- Side Panel Overlay -->
  <div class="side-panel-overlay" id="side-panel-overlay"></div>

  <!-- Side Panel -->
  <div class="side-panel" id="side-panel">
    <button class="side-panel-close" id="side-panel-close">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M12 4L4 12M4 4l8 8" stroke="#262626" stroke-width="1.5" stroke-linecap="round"/></svg>
    </button>

    <div class="side-panel-card">
      <div class="side-panel-header">
        <div class="goal-detail-dot"></div>
        <h2 class="side-panel-title" id="side-panel-title"></h2>
        <div class="side-panel-actions-icons">
          <button class="side-panel-icon-btn" id="side-panel-edit-btn" aria-label="Edit goal" title="Edit goal">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M11.3 2.3a1.5 1.5 0 0 1 2.1 0l.3.3a1.5 1.5 0 0 1 0 2.1l-7.7 7.7-3 .6.6-3 7.7-7.7z" stroke="#262626" stroke-width="1.3" stroke-linejoin="round"/>
              <path d="M10.5 3.1l2.4 2.4" stroke="#262626" stroke-width="1.3" stroke-linecap="round"/>
            </svg>
          </button>
          <button class="side-panel-icon-btn" id="side-panel-delete-btn" aria-label="Delete goal" title="Delete goal">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M2.5 4h11M6 4V2.5h4V4M3.8 4l.7 9a1 1 0 0 0 1 .9h5a1 1 0 0 0 1-.9l.7-9M6.5 6.5v5M9.5 6.5v5" stroke="#262626" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
      </div>

      <hr class="goal-detail-divider" />

      <div class="side-panel-progress">
        <div class="progress-bar"><div class="progress-track"><div class="progress-fill" id="side-panel-progress-fill" style="width:67%"></div></div></div>
        <span class="side-panel-percent" id="side-panel-percent">67% complete</span>
      </div>

      <p class="side-panel-desc" id="side-panel-desc"></p>

      <div class="side-panel-actions-section">
        <p class="goal-detail-actions-label">Actions</p>
        <div class="side-panel-actions" id="side-panel-actions"></div>
      </div>
    </div>

    <div class="side-panel-footer">
      <button class="side-panel-priority-btn" id="side-panel-priority-btn">Make this a priority goal</button>
      <div class="side-panel-created-by">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
          <path d="M7 1l1.5 3.8L12 6l-3.5 1.2L7 11l-1.5-3.8L2 6l3.5-1.2L7 1z" fill="#262626"/>
        </svg>
        <span>This goal was created by Nadia</span>
      </div>
    </div>

    <!-- Swap Modal -->
    <div class="swap-modal" id="swap-modal">
      <p class="swap-modal-prompt">Which priority goal should <strong>move to other goals</strong> to make room?</p>
      <div class="swap-modal-list" id="swap-modal-list"></div>
      <button class="swap-modal-cancel" id="swap-modal-cancel">Cancel</button>
    </div>
  </div>

  <!-- Team Member Drawer Overlay -->
  <div class="side-panel-overlay" id="member-drawer-overlay"></div>

  <!-- Team Member Drawer -->
  <div class="side-panel member-drawer" id="member-drawer">
    <button class="side-panel-close" id="member-drawer-close">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M12 4L4 12M4 4l8 8" stroke="#262626" stroke-width="1.5" stroke-linecap="round"/></svg>
    </button>

    <div class="member-drawer-header" id="member-drawer-header"></div>

    <div class="member-drawer-body" id="member-drawer-body"></div>

    <button class="side-panel-priority-btn member-drawer-assign-btn" id="member-drawer-assign-btn">Assign a Goal</button>
  </div>

  <!-- Edit Goal Modal -->
  <div class="assign-modal-overlay" id="edit-modal-overlay"></div>
  <div class="assign-modal edit-modal" id="edit-modal">
    <h3 class="assign-modal-title">Edit goal</h3>
    <label class="edit-modal-label" for="edit-modal-title-input">Title</label>
    <input type="text" class="assign-modal-input" id="edit-modal-title-input" placeholder="Goal title" />
    <label class="edit-modal-label" for="edit-modal-desc-input">Description</label>
    <textarea class="assign-modal-input edit-modal-textarea" id="edit-modal-desc-input" placeholder="Goal description" rows="4"></textarea>
    <div class="assign-modal-buttons">
      <button class="assign-modal-submit" id="edit-modal-submit">Save</button>
      <button class="assign-modal-cancel" id="edit-modal-cancel">Cancel</button>
    </div>
  </div>

  <!-- Delete Goal Modal -->
  <div class="assign-modal-overlay" id="delete-modal-overlay"></div>
  <div class="assign-modal delete-modal" id="delete-modal">
    <h3 class="assign-modal-title">Delete goal?</h3>
    <p class="delete-modal-msg" id="delete-modal-msg"></p>
    <div class="assign-modal-buttons">
      <button class="assign-modal-submit delete-modal-confirm" id="delete-modal-submit">Delete</button>
      <button class="assign-modal-cancel" id="delete-modal-cancel">Cancel</button>
    </div>
  </div>

  <!-- Assign Goal Modal -->
  <div class="assign-modal-overlay" id="assign-modal-overlay"></div>
  <div class="assign-modal" id="assign-modal">
    <h3 class="assign-modal-title" id="assign-modal-title">Assign a goal to</h3>
    <input type="text" class="assign-modal-input" id="assign-modal-input" placeholder="Enter goal title..." />
    <div class="assign-modal-buttons">
      <button class="assign-modal-submit" id="assign-modal-submit">Assign</button>
      <button class="assign-modal-cancel" id="assign-modal-cancel">Cancel</button>
    </div>
  </div>

  <script src="journeys.js"></script>
</body>
</html>
